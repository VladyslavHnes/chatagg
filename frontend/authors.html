<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatagg - Authors</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <h1><a href="dashboard.html">Chatagg</a></h1>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="index.html">Books</a>
            <a href="authors.html">Authors</a>
            <a href="quotes.html">Quotes</a>
            <a href="stats.html">Stats</a>
            <a href="review.html" class="admin-only">Review</a>
            <a href="users.html" class="admin-only">Users</a>
            <a href="profile.html" id="nav-profile">Profile</a>
            <button id="theme-toggle" title="Toggle theme"></button>
        </nav>
    </header>

    <div class="controls">
        <input type="text" id="filter-input" placeholder="Filter authors..." style="flex:1;min-width:200px;">
        <button id="merge-btn" class="admin-only" disabled>Merge Selected</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:36px;"><input type="checkbox" id="select-all"></th>
                <th>Name</th>
                <th>Country</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="author-table-body">
        </tbody>
    </table>

    <div id="empty-state" class="empty-state" style="display:none;">No authors found.</div>

    <div id="edit-author-modal" class="modal-overlay">
        <div class="modal">
            <h3>Edit Author</h3>
            <div class="form-group">
                <label>Name</label>
                <input id="edit-author-name" type="text">
            </div>
            <div class="form-group">
                <label>Country</label>
                <input id="edit-author-country" type="text">
            </div>
            <div class="actions">
                <button id="edit-author-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
                <button id="edit-author-save-btn" style="background:var(--accent);color:#fff;">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/role.js"></script>
    <script src="js/authors.js"></script>
</body>
</html>
