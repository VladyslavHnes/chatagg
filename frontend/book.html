<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatagg - Book Detail</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <h1><a href="dashboard.html">Chatagg</a></h1>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="index.html">Books</a>
            <a href="authors.html">Authors</a>
            <a href="quotes.html">Quotes</a>
            <a href="stats.html">Stats</a>
            <a href="review.html" class="admin-only">Review</a>
            <a href="users.html" class="admin-only">Users</a>
            <a href="profile.html" id="nav-profile">Profile</a>
            <button id="theme-toggle" title="Toggle theme"></button>
        </nav>
    </header>

    <div style="margin-bottom:20px;">
        <a href="index.html">&larr; Back to books</a>
    </div>

    <div id="book-detail" class="card">
        <div id="loading">Loading...</div>
    </div>

    <h2 style="margin:28px 0 12px;">My Impression</h2>
    <div class="card" id="impression-card">
        <textarea id="impression-text" placeholder="Write your impression of this book..." rows="4" style="width:100%;border:none;background:transparent;color:var(--text-primary);font-family:inherit;font-size:0.95rem;resize:vertical;outline:none;"></textarea>
        <div style="text-align:right;margin-top:8px;">
            <button id="save-impression-btn" class="admin-only" style="background:var(--accent);color:#fff;padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:0.85rem;">Save</button>
        </div>
    </div>

    <h2 id="quotes-heading" style="display:none;margin:28px 0 12px;">Quotes</h2>
    <div id="quotes-list"></div>
    <div id="no-quotes" class="empty-state" style="display:none;">No quotes for this book yet.</div>

    <div id="move-modal" class="modal-overlay">
        <div class="modal">
            <h3>Move Quote</h3>
            <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:16px;">Move this quote to a neighboring book:</p>
            <div id="move-options" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;"></div>
            <div class="actions">
                <button id="move-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal">
            <h3>Edit Quote</h3>
            <textarea id="edit-text" style="min-height:120px;"></textarea>
            <div class="actions">
                <button id="edit-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
                <button id="edit-save-btn" style="background:var(--accent);color:#fff;">Save</button>
            </div>
        </div>
    </div>

    <div id="edit-title-modal" class="modal-overlay">
        <div class="modal">
            <h3>Edit Title</h3>
            <div class="form-group">
                <label>Title</label>
                <input id="edit-title-input" type="text">
            </div>
            <div class="actions">
                <button id="edit-title-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
                <button id="edit-title-save-btn" style="background:var(--accent);color:#fff;">Save</button>
            </div>
        </div>
    </div>

    <div id="edit-author-modal" class="modal-overlay">
        <div class="modal">
            <h3>Edit Author</h3>
            <div class="form-group">
                <label>Name</label>
                <input id="edit-author-name" type="text">
            </div>
            <div class="form-group" style="position:relative;">
                <label>Country</label>
                <input id="edit-author-country" type="text" autocomplete="off">
                <div id="country-suggestions" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--bg-surface);border:1px solid var(--border-color);border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:200px;overflow-y:auto;z-index:10;box-shadow:var(--shadow);"></div>
            </div>
            <div class="actions">
                <button id="edit-author-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
                <button id="edit-author-save-btn" style="background:var(--accent);color:#fff;">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/role.js"></script>
    <script src="js/book-detail.js"></script>
</body>
</html>
