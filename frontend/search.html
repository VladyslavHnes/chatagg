<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatagg - Search Quotes</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <h1><a href="dashboard.html">Chatagg</a></h1>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="index.html">Books</a>
            <a href="authors.html">Authors</a>
            <a href="quotes.html">Quotes</a>
            <a href="stats.html">Stats</a>
            <a href="review.html" class="admin-only">Review</a>
            <a href="users.html" class="admin-only">Users</a>
            <a href="profile.html" id="nav-profile">Profile</a>
            <button id="theme-toggle" title="Toggle theme"></button>
        </nav>
    </header>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Search quotes..." style="flex:1; min-width:200px;">
        <button id="search-btn">Search</button>
    </div>

    <div id="results"></div>
    <div id="empty-state" class="empty-state" style="display:none;">No results found.</div>

    <div class="pagination">
        <button id="prev-btn" disabled>Prev</button>
        <span id="page-info"></span>
        <button id="next-btn" disabled>Next</button>
    </div>

    <script src="js/api.js"></script>
    <script src="js/role.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
