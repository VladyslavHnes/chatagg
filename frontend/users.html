<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatagg - Users</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <h1><a href="dashboard.html">Chatagg</a></h1>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="index.html">Books</a>
            <a href="authors.html">Authors</a>
            <a href="quotes.html">Quotes</a>
            <a href="stats.html">Stats</a>
            <a href="review.html" class="admin-only">Review</a>
            <a href="users.html" class="admin-only">Users</a>
            <a href="profile.html" id="nav-profile">Profile</a>
            <button id="theme-toggle" title="Toggle theme"></button>
        </nav>
    </header>

    <div class="controls">
        <button id="add-user-btn">Add User</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Display Name</th>
                <th>Role</th>
                <th>Created</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="user-table-body">
        </tbody>
    </table>

    <div id="empty-state" class="empty-state" style="display:none;">No users found.</div>

    <div id="add-user-modal" class="modal-overlay">
        <div class="modal">
            <h3>Add User</h3>
            <div class="form-group">
                <label>Username</label>
                <input id="new-username" type="text">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input id="new-password" type="password">
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input id="new-display-name" type="text">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="new-role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="actions">
                <button id="add-user-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
                <button id="add-user-save-btn" style="background:var(--accent);color:#fff;">Save</button>
            </div>
        </div>
    </div>

    <div id="reset-password-modal" class="modal-overlay">
        <div class="modal">
            <h3>Reset Password</h3>
            <div class="form-group">
                <label>New Password</label>
                <input id="reset-password-input" type="password">
            </div>
            <div class="actions">
                <button id="reset-cancel-btn" style="background:var(--bg-surface-hover);color:var(--text-primary);border:1px solid var(--border-color);">Cancel</button>
                <button id="reset-save-btn" style="background:var(--accent);color:#fff;">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/role.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
