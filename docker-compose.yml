version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-chatagg}
      POSTGRES_USER: ${DB_USER:-chatagg}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chatagg}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "${APP_PORT:-7070}:${APP_PORT:-7070}"
    volumes:
      - photos:/app/photos
      - tdlib-session:/app/tdlib-session

volumes:
  pgdata:
  photos:
  tdlib-session:
